<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programming II — Final Exam Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #0094ff;
    --accent3: #ff6b35;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #475569;
    --correct: #22c55e;
    --wrong: #ef4444;
    --code-bg: #0d1117;
    --code-kw: #ff79c6;
    --code-str: #f1fa8c;
    --code-num: #bd93f9;
    --code-type: #8be9fd;
    --code-fn: #50fa7b;
    --code-comment: #6272a4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID NOISE BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,26,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 14px; color: #0a0e1a;
  }
  .header-title { font-size: 1rem; font-weight: 700; letter-spacing: .5px; }
  .header-subtitle { font-size: .7rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .header-stats {
    display: flex; gap: 24px; align-items: center;
  }
  .stat-chip {
    display: flex; flex-direction: column; align-items: center;
    padding: 4px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: .7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
  }
  .stat-chip span { font-size: 1.1rem; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }

  /* ── MAIN LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem;
    gap: 2rem;
    position: relative; z-index: 1;
  }

  /* ── SIDEBAR ── */
  .sidebar { position: sticky; top: 84px; height: fit-content; }
  .sidebar-label {
    font-size: .65rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: .75rem; padding-left: 4px;
  }
  .lecture-nav { display: flex; flex-direction: column; gap: 4px; }
  .lec-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .2s;
    text-align: left; width: 100%;
    font-family: 'Syne', sans-serif; font-size: .8rem; font-weight: 600;
  }
  .lec-btn:hover { background: var(--surface); border-color: var(--border); color: var(--text); }
  .lec-btn.active {
    background: rgba(0,212,170,.1);
    border-color: rgba(0,212,170,.3);
    color: var(--accent);
  }
  .lec-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .lec-btn.active .lec-num { background: var(--accent); color: #0a0e1a; }
  .lec-progress {
    height: 3px; border-radius: 2px; background: var(--surface2);
    margin-top: 2px;
  }
  .lec-progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
  }
  .lec-score {
    font-size: .65rem; font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted); margin-left: auto;
  }

  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  .overall-score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .overall-score-card .big-score {
    font-size: 2.5rem; font-weight: 800; font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .overall-score-card .score-label { font-size: .7rem; color: var(--text-dim); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }

  /* ── MAIN CONTENT ── */
  .main-content { min-width: 0; }

  /* ── LECTURE SECTION ── */
  .lecture-section { display: none; }
  .lecture-section.active { display: block; }

  .lecture-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 1.5rem;
    display: flex; align-items: center; gap: 20px;
  }
  .lecture-icon {
    width: 56px; height: 56px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .lecture-meta { flex: 1; }
  .lecture-num-label { font-size: .65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 4px; }
  .lecture-main-title { font-size: 1.3rem; font-weight: 800; }
  .lecture-tag {
    display: inline-block; margin-top: 6px;
    padding: 3px 10px; border-radius: 20px;
    font-size: .65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  }
  .lecture-progress-bar {
    height: 6px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-top: 12px;
  }
  .lecture-progress-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .5s ease;
  }
  .lecture-stats { display: flex; gap: 16px; margin-top: 10px; }
  .lecture-stat { font-size: .7rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .lecture-stat strong { color: var(--text); }

  /* ── QUESTION CARD ── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 1.25rem;
    transition: border-color .2s;
  }
  .question-card:hover { border-color: rgba(0,212,170,.2); }

  .q-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .q-num {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, rgba(0,212,170,.2), rgba(0,148,255,.2));
    border: 1px solid rgba(0,212,170,.3);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 700; font-family: 'JetBrains Mono', monospace;
    color: var(--accent); flex-shrink: 0;
  }
  .q-text { font-size: .95rem; font-weight: 600; line-height: 1.5; color: var(--text); }

  /* ── CODE BLOCK ── */
  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin: 12px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: .78rem;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    tab-size: 4;
    position: relative;
  }
  .code-block::before {
    content: 'Java';
    position: absolute; top: 8px; right: 12px;
    font-size: .6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
  }
  .kw { color: var(--code-kw); }
  .ty { color: var(--code-type); }
  .fn { color: var(--code-fn); }
  .st { color: var(--code-str); }
  .nm { color: var(--code-num); }
  .cm { color: var(--code-comment); }
  .op { color: #ff79c6; }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
    text-align: left; width: 100%;
    font-family: 'Syne', sans-serif; font-size: .85rem; color: var(--text-dim);
  }
  .option-btn:not(.selected):not(.correct):not(.wrong):hover {
    background: rgba(0,212,170,.05);
    border-color: rgba(0,212,170,.3);
    color: var(--text);
  }
  .opt-letter {
    width: 26px; height: 26px; flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    transition: all .15s;
  }
  .option-btn:not(.selected):not(.correct):not(.wrong):hover .opt-letter {
    background: rgba(0,212,170,.2); border-color: var(--accent); color: var(--accent);
  }
  .option-btn.selected {
    background: rgba(0,148,255,.08); border-color: rgba(0,148,255,.5); color: var(--text);
  }
  .option-btn.selected .opt-letter { background: var(--accent2); color: white; border-color: var(--accent2); }
  .option-btn.correct {
    background: rgba(34,197,94,.1); border-color: var(--correct); color: var(--text);
  }
  .option-btn.correct .opt-letter { background: var(--correct); color: white; border-color: var(--correct); }
  .option-btn.wrong {
    background: rgba(239,68,68,.1); border-color: var(--wrong); color: var(--text);
  }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: white; border-color: var(--wrong); }
  .option-btn.disabled { cursor: default; pointer-events: none; }

  /* ── FEEDBACK ── */
  .feedback {
    display: none; margin-top: 12px;
    padding: 12px 16px; border-radius: 8px;
    font-size: .82rem; line-height: 1.6;
  }
  .feedback.show { display: flex; align-items: flex-start; gap: 10px; }
  .feedback.correct-fb { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: #86efac; }
  .feedback.wrong-fb { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
  .feedback-icon { flex-shrink: 0; font-size: 1rem; }

  /* ── Q FOOTER ── */
  .q-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .q-status { font-size: .72rem; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); }
  .q-status.answered-correct { color: var(--correct); }
  .q-status.answered-wrong { color: var(--wrong); }

  /* ── RESULT BADGE ── */
  .result-badge {
    display: none; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: .72rem; font-weight: 700;
  }
  .result-badge.show { display: inline-flex; }
  .result-badge.pass { background: rgba(34,197,94,.15); color: var(--correct); }
  .result-badge.fail { background: rgba(239,68,68,.15); color: var(--wrong); }

  /* ── SECTION RESULT ── */
  .section-result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-top: 1.5rem;
    text-align: center;
  }
  .section-result .result-score { font-size: 3rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .section-result .result-label { font-size: .8rem; color: var(--text-dim); margin-top: 6px; }
  .section-result .result-message { margin-top: 16px; font-size: .9rem; color: var(--text-dim); }

  /* ── NAVIGATION BUTTONS ── */
  .nav-buttons { display: flex; gap: 12px; margin-top: 1.5rem; justify-content: flex-end; }
  .btn {
    padding: 10px 24px; border-radius: 8px; border: none;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: .85rem;
    cursor: pointer; transition: all .2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0a0e1a;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,170,.3); }
  .btn-secondary {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  /* ── GLOBAL PROGRESS ── */
  .global-progress {
    position: fixed; top: 64px; left: 0; right: 0;
    height: 3px; background: var(--surface);
    z-index: 99;
  }
  .global-progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    transition: width .5s ease;
  }

  /* ── WELCOME SCREEN ── */
  #welcome {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 64px);
    text-align: center; padding: 3rem;
  }
  #welcome.hidden { display: none; }
  .welcome-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 20px;
    background: rgba(0,212,170,.1); border: 1px solid rgba(0,212,170,.3);
    font-size: .75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 2rem;
  }
  .welcome-title {
    font-size: 3.5rem; font-weight: 800; line-height: 1.1;
    margin-bottom: 1.5rem;
  }
  .welcome-title span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .welcome-desc { font-size: 1rem; color: var(--text-dim); max-width: 560px; line-height: 1.7; margin-bottom: 2.5rem; }
  .welcome-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    max-width: 640px; width: 100%; margin-bottom: 3rem;
  }
  .welcome-stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; text-align: center;
  }
  .welcome-stat .ws-num { font-size: 2rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .welcome-stat .ws-label { font-size: .7rem; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .start-btn {
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800;
    color: #0a0e1a; cursor: pointer;
    transition: all .2s;
    letter-spacing: .5px;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,212,170,.4); }

  /* ── FINAL RESULTS ── */
  #final-results {
    display: none;
    flex-direction: column; align-items: center;
    padding: 3rem; text-align: center;
  }
  #final-results.show { display: flex; }
  .final-badge {
    font-size: 4rem; margin-bottom: 1rem;
  }
  .final-score-big {
    font-size: 5rem; font-weight: 800; font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .final-subtitle { font-size: 1.1rem; color: var(--text-dim); margin: .5rem 0 2rem; }
  .lecture-results-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    max-width: 700px; width: 100%; margin-bottom: 2rem;
  }
  .lec-result-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px;
  }
  .lrc-name { font-size: .7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .lrc-score { font-size: 1.5rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; margin: 4px 0; }
  .lrc-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .lrc-fill { height: 100%; border-radius: 2px; transition: width .8s ease; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .lecture-nav { flex-direction: row; flex-wrap: wrap; }
    .lec-btn { flex: 1; min-width: 100px; justify-content: center; }
    .welcome-title { font-size: 2.2rem; }
    .welcome-grid { grid-template-columns: repeat(3, 1fr); }
    .lecture-results-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .question-card { animation: fadeIn .3s ease both; }
  .question-card:nth-child(2) { animation-delay: .05s; }
  .question-card:nth-child(3) { animation-delay: .1s; }
  .question-card:nth-child(4) { animation-delay: .15s; }
  .question-card:nth-child(5) { animation-delay: .2s; }
  .question-card:nth-child(6) { animation-delay: .25s; }
  .question-card:nth-child(7) { animation-delay: .3s; }
  .question-card:nth-child(8) { animation-delay: .35s; }
  .question-card:nth-child(9) { animation-delay: .4s; }
  .question-card:nth-child(10) { animation-delay: .45s; }

  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .feedback.show { animation: popIn .2s ease; }

  .pulse { animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">PII</div>
    <div>
      <div class="header-title">Programming II</div>
      <div class="header-subtitle">Final Exam Preparation Quiz</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-chip"><span id="hdr-answered">0</span>Answered</div>
    <div class="stat-chip"><span id="hdr-correct">0</span>Correct</div>
    <div class="stat-chip"><span id="hdr-score">0%</span>Score</div>
  </div>
</header>

<!-- GLOBAL PROGRESS -->
<div class="global-progress"><div class="global-progress-fill" id="global-progress" style="width:0%"></div></div>

<!-- WELCOME SCREEN -->
<div id="welcome">
  <div class="welcome-badge">📘 Programming II · Java</div>
  <h1 class="welcome-title">Final Exam<br><span>Quiz Practice</span></h1>
  <p class="welcome-desc">
    Test your Java mastery across 9 core lectures. Every question is a <strong>code trace.
  </p>
  <div class="welcome-grid">
    <div class="welcome-stat"><div class="ws-num">9</div><div class="ws-label">Lectures</div></div>
    <div class="welcome-stat"><div class="ws-num">120</div><div class="ws-label">Questions</div></div>
    <div class="welcome-stat"><div class="ws-num">100%</div><div class="ws-label">Code Trace</div></div>
  </div>
  <button class="start-btn" onclick="startQuiz()">▶ Start Quiz</button>
</div>

<!-- QUIZ LAYOUT -->
<div class="layout" id="quiz-layout" style="display:none">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">Lectures</div>
    <nav class="lecture-nav" id="lecture-nav"></nav>
    <hr class="sidebar-divider">
    <div class="overall-score-card">
      <div class="big-score" id="sidebar-score">0%</div>
      <div class="score-label">Overall Score</div>
      <div class="lecture-progress-bar" style="margin-top:12px">
        <div class="lecture-progress-fill" id="sidebar-progress" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content" id="main-content"></main>
</div>

<!-- FINAL RESULTS -->
<div id="final-results">
  <div class="final-badge" id="final-badge">🎓</div>
  <div class="final-score-big" id="final-score-pct">0%</div>
  <div class="final-subtitle" id="final-msg">Quiz Complete!</div>
  <div class="lecture-results-grid" id="lec-results-grid"></div>
  <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top:1rem">🔄 Restart Quiz</button>
</div>

<script>
// ═══════════════════════════════════════════════════
//  QUIZ DATA — 9 Lectures × 10 Questions Each
// ═══════════════════════════════════════════════════
const lectures = [
  {

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const state = {
  answers: {},    // "L-Q" : index chosen
  revealed: {},   // "L-Q" : true
};

function getKey(lIdx, qIdx) { return `${lIdx}-${qIdx}`; }

function totalAnswered() { return Object.keys(state.answers).length; }
function totalCorrect()  {
  return Object.entries(state.answers).filter(([k, v]) => {
    const [li, qi] = k.split('-').map(Number);
    return lectures[li].questions[qi].correct === v;
  }).length;
}

function lectureScore(li) {
  const qs = lectures[li].questions;
  let correct = 0, answered = 0;
  qs.forEach((q, qi) => {
    const k = getKey(li, qi);
    if (state.answers[k] !== undefined) {
      answered++;
      if (state.answers[k] === q.correct) correct++;
    }
  });
  return { correct, answered, total: qs.length };
}

// ═══════════════════════════════════════════════════
//  BUILD UI
// ═══════════════════════════════════════════════════
function buildSidebar() {
  const nav = document.getElementById('lecture-nav');
  nav.innerHTML = '';
  lectures.forEach((lec, li) => {
    const sc = lectureScore(li);
    const btn = document.createElement('button');
    btn.className = 'lec-btn' + (li === 0 ? ' active' : '');
    btn.id = `nav-${li}`;
    btn.innerHTML = `
      <span class="lec-num">${li+1}</span>
      <span style="flex:1;font-size:.72rem">${lec.title}</span>
      <span class="lec-score" id="lec-score-${li}">${sc.answered}/${sc.total}</span>
    `;
    btn.onclick = () => showLecture(li);
    nav.appendChild(btn);
  });
}

function buildMain() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  lectures.forEach((lec, li) => {
    const section = document.createElement('div');
    section.className = 'lecture-section' + (li === 0 ? ' active' : '');
    section.id = `section-${li}`;

    const sc = lectureScore(li);
    section.innerHTML = `
      <div class="lecture-header">
        <div class="lecture-icon" style="background:linear-gradient(135deg,${lec.color}22,${lec.color}44);border:1px solid ${lec.color}44">${lec.icon}</div>
        <div class="lecture-meta">
          <div class="lecture-num-label">Lecture ${li+1} of 9</div>
          <div class="lecture-main-title">${lec.title}</div>
          <div class="lecture-tag" style="background:${lec.color}22;color:${lec.color};border:1px solid ${lec.color}44">${lec.tag} · Code Trace · 10 Questions</div>
          <div class="lecture-progress-bar"><div class="lecture-progress-fill" id="lec-prog-${li}" style="width:${sc.answered*10}%"></div></div>
          <div class="lecture-stats">
            <div class="lecture-stat" id="lec-stat-${li}"><strong>${sc.answered}</strong> answered · <strong id="lec-corr-${li}">${sc.correct}</strong> correct</div>
          </div>
        </div>
      </div>
    `;

    lec.questions.forEach((q, qi) => {
      const key = getKey(li, qi);
      const chosen = state.answers[key];
      const revealed = state.revealed[key];

      const card = document.createElement('div');
      card.className = 'question-card';
      card.id = `card-${li}-${qi}`;

      let opts = q.options.map((opt, oi) => {
        let cls = 'option-btn';
        if (revealed) {
          cls += ' disabled';
          if (oi === q.correct) cls += ' correct';
          else if (oi === chosen && chosen !== q.correct) cls += ' wrong';
        } else if (oi === chosen) cls += ' selected';
        return `<button class="${cls}" onclick="choose(${li},${qi},${oi})">
          <span class="opt-letter">${'ABCD'[oi]}</span>
          <span>${opt}</span>
        </button>`;
      }).join('');

      let fbHtml = '';
      if (revealed) {
        const correct = chosen === q.correct;
        fbHtml = `<div class="feedback show ${correct ? 'correct-fb' : 'wrong-fb'}">
          <span class="feedback-icon">${correct ? '✅' : '❌'}</span>
          <span><strong>${correct ? 'Correct!' : 'Wrong.'}</strong> ${q.explain}</span>
        </div>`;
      }

      let statusCls = 'q-status', statusTxt = 'Unanswered';
      if (revealed) {
        if (chosen === q.correct) { statusCls += ' answered-correct'; statusTxt = '✓ Correct'; }
        else { statusCls += ' answered-wrong'; statusTxt = '✗ Incorrect'; }
      } else if (chosen !== undefined) { statusTxt = 'Selected — click to reveal'; }

      card.innerHTML = `
        <div class="q-header">
          <div class="q-num">Q${qi+1}</div>
          <div class="q-text">${q.q}</div>
        </div>
        <div class="code-block">${q.code}</div>
        <div class="options">${opts}</div>
        ${fbHtml}
        <div class="q-footer">
          <span class="${statusCls}" id="status-${li}-${qi}">${statusTxt}</span>
          ${revealed && chosen !== q.correct ? `<span style="font-size:.72rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace">Correct: ${'ABCD'[q.correct]}) ${q.options[q.correct]}</span>` : ''}
        </div>
      `;
      section.appendChild(card);
    });

    main.appendChild(section);
  });
}

function showLecture(li) {
  document.querySelectorAll('.lecture-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.lec-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`section-${li}`).classList.add('active');
  document.getElementById(`nav-${li}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════
function choose(li, qi, oi) {
  const key = getKey(li, qi);
  if (state.revealed[key]) return;

  if (state.answers[key] === undefined) {
    // First click: select
    state.answers[key] = oi;
    // Auto-reveal
    state.revealed[key] = true;
    refreshCard(li, qi);
    updateStats();
  }
}

function refreshCard(li, qi) {
  const key = getKey(li, qi);
  const q = lectures[li].questions[qi];
  const chosen = state.answers[key];
  const revealed = state.revealed[key];
  const card = document.getElementById(`card-${li}-${qi}`);
  if (!card) return;

  // Update option buttons
  const opts = card.querySelectorAll('.option-btn');
  opts.forEach((btn, oi) => {
    btn.className = 'option-btn';
    if (revealed) {
      btn.classList.add('disabled');
      if (oi === q.correct) btn.classList.add('correct');
      else if (oi === chosen && chosen !== q.correct) btn.classList.add('wrong');
    } else if (oi === chosen) btn.classList.add('selected');
    btn.onclick = () => choose(li, qi, oi);
  });

  // Feedback
  let fb = card.querySelector('.feedback');
  if (!fb) { fb = document.createElement('div'); fb.className = 'feedback'; card.querySelector('.options').after(fb); }
  if (revealed) {
    const correct = chosen === q.correct;
    fb.className = `feedback show ${correct ? 'correct-fb' : 'wrong-fb'}`;
    fb.innerHTML = `<span class="feedback-icon">${correct ? '✅' : '❌'}</span><span><strong>${correct ? 'Correct!' : 'Wrong.'}</strong> ${q.explain}</span>`;
  } else fb.className = 'feedback';

  // Status
  const st = document.getElementById(`status-${li}-${qi}`);
  if (st) {
    st.className = 'q-status';
    let txt = 'Unanswered';
    if (revealed) {
      if (chosen === q.correct) { st.classList.add('answered-correct'); txt = '✓ Correct'; }
      else { st.classList.add('answered-wrong'); txt = '✗ Incorrect'; }
    } else if (chosen !== undefined) txt = 'Selected';
    st.textContent = txt;
  }
}

function updateStats() {
  const ans = totalAnswered(), cor = totalCorrect();
  const pct = ans > 0 ? Math.round(cor / ans * 100) : 0;
  const total = 90;

  document.getElementById('hdr-answered').textContent = ans;
  document.getElementById('hdr-correct').textContent = cor;
  document.getElementById('hdr-score').textContent = pct + '%';
  document.getElementById('sidebar-score').textContent = pct + '%';
  document.getElementById('sidebar-progress').style.width = (ans / total * 100) + '%';
  document.getElementById('global-progress').style.width = (ans / total * 100) + '%';

  lectures.forEach((lec, li) => {
    const sc = lectureScore(li);
    const el = document.getElementById(`lec-score-${li}`);
    if (el) el.textContent = `${sc.answered}/${sc.total}`;
    const prog = document.getElementById(`lec-prog-${li}`);
    if (prog) prog.style.width = (sc.answered / sc.total * 100) + '%';
    const stat = document.getElementById(`lec-stat-${li}`);
    if (stat) stat.innerHTML = `<strong>${sc.answered}</strong> answered · <strong id="lec-corr-${li}">${sc.correct}</strong> correct`;
  });

  if (ans === total) showFinalResults();
}

function showFinalResults() {
  setTimeout(() => {
    const cor = totalCorrect(), pct = Math.round(cor / 90 * 100);
    document.getElementById('final-score-pct').textContent = pct + '%';
    document.getElementById('final-badge').textContent = pct >= 90 ? '🏆' : pct >= 70 ? '🎓' : pct >= 50 ? '📚' : '💪';
    document.getElementById('final-msg').textContent =
      pct >= 90 ? 'Outstanding! You\'re fully prepared for the final exam!' :
      pct >= 70 ? 'Great work! Review the lectures you missed and you\'re ready.' :
      pct >= 50 ? 'Good effort! Focus on your weaker areas.' : 'Keep practicing — review each lecture carefully.';

    const grid = document.getElementById('lec-results-grid');
    grid.innerHTML = lectures.map((lec, li) => {
      const sc = lectureScore(li);
      const p = Math.round(sc.correct / sc.total * 100);
      const col = p >= 70 ? 'var(--correct)' : p >= 50 ? 'var(--accent)' : 'var(--wrong)';
      return `<div class="lec-result-card">
        <div class="lrc-name">${lec.tag}: ${lec.title.slice(0,16)}</div>
        <div class="lrc-score" style="color:${col}">${sc.correct}/${sc.total}</div>
        <div class="lrc-bar"><div class="lrc-fill" style="width:${p}%;background:${col}"></div></div>
      </div>`;
    }).join('');

    document.getElementById('quiz-layout').style.display = 'none';
    document.getElementById('final-results').classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 600);
}

// ═══════════════════════════════════════════════════
//  LIFECYCLE
// ═══════════════════════════════════════════════════
function startQuiz() {
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('quiz-layout').style.display = 'grid';
  buildSidebar();
  buildMain();
  window.scrollTo({ top: 0 });
}

function restartQuiz() {
  state.answers = {};
  state.revealed = {};
  document.getElementById('final-results').classList.remove('show');
  document.getElementById('quiz-layout').style.display = 'grid';
  buildSidebar();
  buildMain();
  updateStats();
  showLecture(0);
  window.scrollTo({ top: 0 });
}
</script>
